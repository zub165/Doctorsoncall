name: Deploy React (Doctor On Call) to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "resources/js/docsoncalls/**"
      - "docsoncalls-pages/**"
      - "vite.pages.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript-based actions now.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Pages build env (override via GitHub Variables/Secrets if needed)
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
  VITE_EMR_API_BASE_URL: ${{ vars.VITE_EMR_API_BASE_URL }}
  VITE_MAPS_API_BASE_URL: ${{ vars.VITE_MAPS_API_BASE_URL }}
  VITE_ROUTER_MODE: ${{ vars.VITE_ROUTER_MODE }}
  VITE_ROUTER_BASENAME: ${{ vars.VITE_ROUTER_BASENAME }}
  VITE_PAGES_BASE: ${{ vars.VITE_PAGES_BASE }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Pages bundle
        run: npm run build:pages

      - name: Normalize output (index.html at dist root)
        run: |
          cp dist/docsoncalls-pages/index.html dist/index.html
          # Preserve additional pages (multi-page build)
          if [ -f dist/docsoncalls-pages/privacy.html ]; then cp dist/docsoncalls-pages/privacy.html dist/privacy.html; fi
          if [ -f dist/docsoncalls-pages/delete.html ]; then cp dist/docsoncalls-pages/delete.html dist/delete.html; fi
          rm -rf dist/docsoncalls-pages

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

