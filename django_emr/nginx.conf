# Local dev (port 3015). Production TLS example: nginx_api_production.conf.example

upstream django_emr {
    server 127.0.0.1:3015;
}

server {
    listen 3015;
    server_name _;

    client_max_body_size 20M;

    location / {
        proxy_pass http://django_emr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # After: python manage.py collectstatic --noinput
    location /static/ {
        alias /var/www/django_emr/staticfiles/;
    }

    location /media/ {
        alias /var/www/django_emr/media/;
    }
}
